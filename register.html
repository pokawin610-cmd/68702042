<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Page</title>
  <!-- Bootstrap 5 CDN -->
  <link href="css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    
<!--เมนู-->
  <div id="menu-container"></div>

  <div class="d-flex justify-content-center align-items-center vh-100">
    <div class="card shadow p-4" style="width: 350px; border-radius: 15px;">
      <h3 class="text-center mb-4">Register</h3>
      <form>
        <div class="mb-3">
          <label for="username" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="username" required>
        </div>
        <div class="mb-3">
          <label for="email" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="email" required>
        </div>
        <div class="mb-3">
          <label for="tel" class="form-label">Phone Number</label>
          <input type="password" class="form-control" id="password" required>
        </div>
        <div class="mb-3">
        <label for="username" class="form-label">Select Course</label>
        <select class="form-select" id="floatingSelect">
        <option value="1">Course1</option>
        <option value="2">Course2</option>
        <option value="3">Course3</option>
        <option value="4">Course4</option>
        <option value="5">Course5</option>
        <option value="6">Course6</option>
        </select>  
  </div>

        <button type="submit" class="btn btn-primary w-100">Register</button>
        <div class="text-center mt-3">
          
        </div>
      </form>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
<script src="js/bootstrap.bundle.min.js"></script>
<script src="js/menu.js"></script>
